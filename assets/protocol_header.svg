<svg fill="none" viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .strip { background: linear-gradient(90deg, #050505, #001a1a, #050505, #1a1400, #050505); background-size: 200% 100%; animation: flow 10s linear infinite; height: 60px; display: flex; align-items: center; padding-left: 30px; border-left: 5px solid #00FFFF; border-bottom: 1px solid #00FFFF33; }
        .text { color: white; font-family: sans-serif; font-size: 18px; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px #00FFFF; }
      </style>
      <div class="strip"><div class="text">✧ THE SOVEREIGN PROTOCOL</div></div>
    </div>
  </foreignObject>
</svg>
